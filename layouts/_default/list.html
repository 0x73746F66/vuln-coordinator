{{ define "main" }}
<div class="section-hero">
  <div class="section-hero__eyebrow">{{ .Title }}</div>
  <h1 class="section-hero__title">{{ .Title }}</h1>
  {{ with .Content }}
    <p class="section-hero__desc">{{ . | plainify | truncate 200 }}</p>
  {{ end }}
</div>
<div class="section-list">
  <div class="section-list__grid">
    {{ range .Pages }}
      <a class="section-list-card" href="{{ .RelPermalink }}">
        <div class="section-list-card__title">{{ .Title }}</div>
        {{ with .Description }}
          <div class="section-list-card__desc">{{ . }}</div>
        {{ else }}
          {{ with .Summary }}
            <div class="section-list-card__desc">{{ . | plainify | truncate 100 }}</div>
          {{ end }}
        {{ end }}
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
